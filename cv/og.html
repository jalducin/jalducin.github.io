<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;}
  body{background:#0d1117;color:#c9d1d9;font-family:"Segoe UI",Arial,sans-serif;
       display:flex;flex-direction:column;justify-content:center;padding:70px 80px;position:relative;}
  .grid{position:absolute;inset:0;background-image:radial-gradient(rgba(88,166,255,.12) 1px,transparent 1px);background-size:26px 26px;opacity:.5;}
  .bar{position:absolute;left:0;top:0;height:100%;width:10px;background:#58a6ff;box-shadow:0 0 40px rgba(88,166,255,.6);}
  h1{font-family:"Courier New",monospace;font-size:62px;color:#58a6ff;letter-spacing:1px;
     text-shadow:0 0 28px rgba(88,166,255,.5);line-height:1.05;}
  .role{font-size:30px;color:#58a6ff;font-weight:700;margin-top:14px;}
  .sub{font-size:22px;color:#8b949e;margin-top:10px;}
  .badges{display:flex;gap:14px;margin-top:34px;flex-wrap:wrap;}
  .b{font-family:"Courier New",monospace;font-size:19px;color:#58a6ff;border:1px solid rgba(88,166,255,.5);
     border-radius:999px;padding:8px 18px;background:rgba(88,166,255,.08);}
  .foot{position:absolute;bottom:46px;left:80px;font-family:"Courier New",monospace;color:#8b949e;font-size:20px;}
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="bar"></div>
  <h1>Juan Valentin Alducin</h1>
  <div class="role">Senior Backend Engineer · AI-native Development</div>
  <div class="sub">Spec-Driven Development · AWS Serverless · Python · LLMs (Claude · Gemini · OpenAI)</div>
  <div class="badges">
    <span class="b">~40% faster reviews</span>
    <span class="b">80% N1 self-resolution</span>
    <span class="b">&lt;10 min first response</span>
  </div>
  <div class="foot">jalducin.github.io</div>
</body>
</html>
